name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Using your specific local version for parity
          flutter-version: '3.41.6' 
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: |
          # 1. Standard Flutter dependency sync
          flutter pub get
          
          # 2. Force Flutter to download the iOS engine and artifacts
          flutter precache --ios
          
          # 3. Clean and Re-install Pods to fix the 'Module not found' issue
          cd ios
          # Ensure CocoaPods knows about the iOS 13.0 requirement
          pod repo update
          # Remove local cache to force a fresh link to plugins
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA for Sideloading
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r VelocityTracker.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityTracker-iOS-Release
          path: VelocityTracker.ipa
          retention-days: 7