name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Using your specific local version for parity
          flutter-version: '3.41.6' 
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: |
          flutter pub get
          # Navigate to iOS and update pods to match the new SDKs
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA for Sideloading
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r VelocityTracker.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VelocityTracker-iOS-Release
          path: VelocityTracker.ipa
          retention-days: 7